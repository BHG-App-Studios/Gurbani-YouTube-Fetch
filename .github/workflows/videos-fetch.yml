name: Videos Fetch

on:
  workflow_dispatch:

jobs:
  update-live-streams:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        # Need to fetch history for pushing back later if using specific auth, 
        # but standard checkout is usually fine for default token pushing.

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests firebase-admin google-cloud-firestore
          pip install requests firebase-admin beautifulsoup4

      - name: 🎵 Run All Youtube Videos Fetch
        env:
          FIREBASE_SERVICE_ACCOUNT_GURBANI: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GURBANI }}
          FIREBASE_SERVICE_ACCOUNT_HARMANDIR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARMANDIR }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python videos-fetch/All-Videos-Fetch.py
        
      # ---------------- SGPC ----------------

      - name: 🚀 Run Fatehgarh Sahib Hukamnama Katha Fetch
        env:
          FIREBASE_SERVICE_ACCOUNT_GURBANI: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GURBANI }}
          FIREBASE_SERVICE_ACCOUNT_HARMANDIR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARMANDIR }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python videos-fetch/Fatehgarh-Sahib-Hukamnama-Katha.py

      - name: 🛕 Run Harmandir Sahib Hukamnama Fetch
        env:
          FIREBASE_SERVICE_ACCOUNT_GURBANI: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GURBANI }}
          FIREBASE_SERVICE_ACCOUNT_HARMANDIR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARMANDIR }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python videos-fetch/Harmandir-Sahib-Hukamnama.py

      - name: 🛕 Run Harmandir Sahib Hukamnama Katha Fetch
        env:
          FIREBASE_SERVICE_ACCOUNT_GURBANI: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GURBANI }}
          FIREBASE_SERVICE_ACCOUNT_HARMANDIR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARMANDIR }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python videos-fetch/Harmandir-Sahib-Hukamnama-Katha.py

      - name: 🛕 Run Hazur Sahib Hukamnama Fetch
        env:
          FIREBASE_SERVICE_ACCOUNT_GURBANI: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GURBANI }}
          FIREBASE_SERVICE_ACCOUNT_HARMANDIR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARMANDIR }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python videos-fetch/Hazur-Sahib-Hukamnama.py

      # ---------------- SAVE STATE ----------------
      
      - name: 💾 Commit and Push State Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add more/
          # Only commit if there are changes in the 'more/' folder (avoids workflow errors)
          git diff --quiet && git diff --staged --quiet || git commit -m "Update fetched video state logs"
          git push
