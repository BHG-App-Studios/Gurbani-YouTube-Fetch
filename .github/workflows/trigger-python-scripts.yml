          FIREBASE_SERVICE_ACCOUNT_HARMANDIR: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HARMANDIR }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python Fatehgarh-Sahib-Fetch.py

      - name: 🛕 Run Takht Sri Kesgarh Sahib Fetch
